# Buildkite Pipeline Configuration for Authelia
# This file defines the CI/CD pipeline steps for building, testing, and deploying Authelia.

env:
  DOCKER_BUILDKIT: 1
  BUILDKITE_CLEAN_CHECKOUT: true

steps:
  - label: ":lint: Lint"
    key: lint
    command: "make lint"
    plugins:
      - docker#v5.9.0:
          image: "golang:1.21-alpine"
          environment:
            - GOPATH
            - GOCACHE
          volumes:
            - "/go/pkg/mod:/go/pkg/mod"
    agents:
      queue: default

  - label: ":test: Unit Tests"
    key: unit-test
    command: "make test"
    plugins:
      - docker#v5.9.0:
          image: "golang:1.21-alpine"
          environment:
            - GOPATH
            - GOCACHE
          volumes:
            - "/go/pkg/mod:/go/pkg/mod"
    agents:
      queue: default
    artifact_paths:
      - "coverage.out"
      - "coverage.html"

  - wait: ~
    continue_on_failure: false

  - label: ":docker: Build Docker Image"
    key: build-docker
    command: "make docker-build"
    agents:
      queue: default
    env:
      DOCKER_BUILDKIT: 1

  - label: ":docker: Build Docker Arm64 Image"
    key: build-docker-arm64
    command: "make docker-build-arm64"
    agents:
      queue: arm64
    env:
      DOCKER_BUILDKIT: 1

  - wait: ~
    continue_on_failure: false

  - label: ":rocket: Integration Tests"
    key: integration-test
    command: ".buildkite/scripts/integration-test.sh"
    agents:
      queue: default
    artifact_paths:
      - "test/logs/**/*"

  - block: ":shipit: Deploy to Staging?"
    key: deploy-staging-gate
    branches: "main"

  - label: ":shipit: Deploy to Staging"
    key: deploy-staging
    command: ".buildkite/scripts/deploy.sh staging"
    depends_on: deploy-staging-gate
    branches: "main"
    agents:
      queue: default
